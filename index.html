<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiet Commitments</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"DM Serif Display"', 'serif'],
            body: ['"Manrope"', 'sans-serif']
          },
          colors: {
            tide: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e'
            }
          },
          boxShadow: {
            warm: '0 10px 30px -16px rgba(20, 184, 166, 0.28)'
          },
          animation: {
            floatIn: 'floatIn .6s ease forwards',
            pulseSoft: 'pulseSoft 2.2s ease-in-out infinite'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      background:
        radial-gradient(circle at 12% 12%, rgba(20, 184, 166, 0.16), transparent 35%),
        radial-gradient(circle at 88% 82%, rgba(6, 182, 212, 0.13), transparent 38%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 52%, #f0fdfa 100%);
      background-repeat: no-repeat;
      background-size: 100% 100%, 100% 100%, 100% 100%;
      min-height: 100vh;
    }

    .glass {
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(20, 184, 166, 0.18);
    }

    .card-enter {
      opacity: 0;
      transform: translateY(10px) scale(.985);
      animation: floatIn .45s ease forwards;
    }

    @keyframes floatIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulseSoft {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes confettiFall {
      from {
        transform: translateY(-12vh) rotate(0deg);
        opacity: 0;
      }
      8% { opacity: 1; }
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .heat-cell,
    .mini-cell {
      border-radius: 0.38rem;
      transition: transform .18s ease, filter .2s ease;
    }

    .heat-cell:hover,
    .mini-cell:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .focus-ring:focus-visible {
      outline: 2px solid #14b8a6;
      outline-offset: 2px;
    }
  </style>
</head>
<body class="text-zinc-900 font-body antialiased">
  <div id="confetti-layer" class="fixed inset-0 pointer-events-none overflow-hidden z-50" aria-hidden="true"></div>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <header class="glass rounded-3xl p-6 sm:p-8 shadow-warm mb-6 sm:mb-8">
      <div class="flex flex-col lg:flex-row gap-6 lg:gap-10 lg:items-end lg:justify-between">
        <div>
          <p id="greeting" class="text-tide-700 text-sm tracking-wide uppercase font-semibold"></p>
          <h1 class="font-display text-4xl sm:text-5xl lg:text-6xl leading-tight text-zinc-900 mt-2">
            Quiet Commitments
          </h1>
          <p id="today-date" class="mt-3 text-zinc-600 text-base sm:text-lg"></p>
        </div>
        <blockquote class="max-w-xl">
          <p id="motivation" class="text-lg sm:text-2xl leading-relaxed text-zinc-800 italic"></p>
        </blockquote>
      </div>
    </header>

    <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 sm:mb-8" id="stats-grid" aria-live="polite"></section>

    <section class="glass rounded-2xl p-5 sm:p-6 mb-6 sm:mb-8 card-enter">
      <div class="flex flex-col sm:flex-row sm:items-end gap-3 sm:gap-4">
        <div class="flex-1">
          <label for="goal-title" class="block text-sm text-zinc-600 mb-2">Add a goal</label>
          <input
            id="goal-title"
            class="w-full rounded-xl bg-white border border-zinc-300 px-4 py-3 text-zinc-900 placeholder-zinc-400 focus-ring"
            type="text"
            maxlength="120"
            placeholder="Read 20 minutes, workout, practice guitar..."
          />
        </div>
        <button id="add-goal-btn" class="focus-ring rounded-xl bg-tide-600 hover:bg-tide-500 transition-colors px-5 py-3 font-semibold text-white">
          Add Goal
        </button>
      </div>
      <p id="goal-feedback" class="text-sm mt-3 text-zinc-500" aria-live="polite"></p>
    </section>

    <section class="grid lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 space-y-6">
        <article class="glass rounded-2xl p-5 sm:p-6 card-enter">
          <div class="flex items-center justify-between gap-3 mb-4">
            <h2 class="font-display text-2xl sm:text-3xl text-zinc-900">Your Goals</h2>
            <p id="goals-empty-label" class="text-sm text-zinc-500"></p>
          </div>
          <div id="goals-list" class="grid gap-4"></div>
        </article>

        <article class="glass rounded-2xl p-5 sm:p-6 card-enter">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-display text-2xl sm:text-3xl text-zinc-900">Consistency Heatmap</h2>
            <span class="text-xs text-zinc-500">Last 140 days</span>
          </div>
          <div class="overflow-x-auto pb-1">
            <div id="heatmap" class="inline-grid grid-flow-col grid-rows-7 auto-cols-max gap-1 sm:gap-1.5"></div>
          </div>
          <div class="flex items-center gap-3 mt-4 text-xs text-zinc-500">
            <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded bg-zinc-300"></span>No data</span>
            <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-600/80"></span>Missed</span>
            <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded bg-tide-500"></span>Done</span>
          </div>
        </article>
      </div>

      <aside class="space-y-6">
        <article class="glass rounded-2xl p-5 sm:p-6 card-enter" id="goal-idea-helper">
          <h2 class="font-display text-2xl text-zinc-900 mb-2">Need Goal Ideas?</h2>
          <p class="text-sm text-zinc-500 mb-4">Pick a focus and effort level. Tap any suggestion to add it instantly.</p>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
            <label class="text-sm text-zinc-600" for="idea-focus">
              Focus area
              <select id="idea-focus" class="mt-1 w-full rounded-xl bg-white border border-zinc-300 px-3 py-2 text-zinc-900 focus-ring">
                <option value="energy">Energy</option>
                <option value="mind">Mind</option>
                <option value="learning">Learning</option>
                <option value="relationships">Relationships</option>
                <option value="organization">Organization</option>
                <option value="all">Mix it up</option>
              </select>
            </label>

            <label class="text-sm text-zinc-600" for="idea-effort">
              Daily effort
              <select id="idea-effort" class="mt-1 w-full rounded-xl bg-white border border-zinc-300 px-3 py-2 text-zinc-900 focus-ring">
                <option value="tiny">Tiny (5-10 min)</option>
                <option value="steady" selected>Steady (15-25 min)</option>
                <option value="deep">Deep (30-45 min)</option>
              </select>
            </label>
          </div>

          <button id="refresh-ideas-btn" class="focus-ring mb-3 text-sm rounded-lg px-3 py-2 bg-white hover:bg-tide-50 border border-zinc-300 transition-colors text-zinc-700">
            New ideas
          </button>

          <div id="idea-results" class="flex flex-wrap gap-2" aria-live="polite"></div>
          <p id="idea-helper-note" class="text-xs text-zinc-500 mt-3"></p>
        </article>

        <article class="glass rounded-2xl p-5 sm:p-6 card-enter">
          <h2 class="font-display text-2xl text-zinc-900 mb-3">Daily Reflection</h2>
          <p class="text-sm text-zinc-500 mb-3">A quiet place to be honest with yourself.</p>
          <textarea
            id="daily-reflection"
            rows="10"
            class="w-full rounded-xl bg-white border border-zinc-300 p-3 text-zinc-900 placeholder-zinc-400 focus-ring"
            placeholder="What did I follow through on today? What made it easier or harder?"
          ></textarea>
          <p id="reflection-status" class="mt-2 text-xs text-zinc-500" aria-live="polite">Saved locally</p>
        </article>

        <article class="glass rounded-2xl p-5 sm:p-6 card-enter">
          <h2 class="font-display text-2xl text-zinc-900 mb-3">Daily Prompt</h2>
          <p id="prompt-box" class="text-zinc-700 leading-relaxed"></p>
          <button id="next-prompt-btn" class="focus-ring mt-4 text-sm rounded-lg px-3 py-2 bg-white hover:bg-tide-50 border border-zinc-300 transition-colors text-zinc-700">
            New prompt
          </button>
        </article>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
